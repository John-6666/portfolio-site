<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Name - Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
    }

    header {
      text-align: center;
      padding: 80px 20px;
      background: white;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      color: #6e6e73;
    }

    .section {
      max-width: 900px;
      margin: 40px auto;
      padding: 40px;
      background: white;
      border-radius: 20px;
    }

    button {
      background: black;
      color: white;
      padding: 12px 20px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    .hidden {
      display: none;
      margin-top: 20px;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: none;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Your Name</h1>
  <p>Business Analyst | Data | Power BI</p>
</header>

<div class="section">
  <h2>Work Experience</h2>
  <p>L'Oréal Buycoor – Business Analyst</p>
</div>

<div class="section">
  <h2>Project Case</h2>
  <button onclick="toggleCase()">View Case</button>

  <div id="case" class="hidden">
    <p>This is your analysis case...</p>
  </div>
</div>

<div class="section">
  <h2>Power BI Dashboard</h2>

  <!-- 替换成你的 Power BI 链接 -->
  <iframe src="https://app.powerbi.com/view?r=YOUR_LINK"></iframe>
</div>

<script>
function toggleCase() {
  var x = document.getElementById("case");
  if (x.style.display === "none" || x.style.display === "") {
    x.style.display = "block";
  } else {
    x.style.display = "none";
  }
}
</script>

</body>
</html>
