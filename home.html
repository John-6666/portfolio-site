<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zuko Liao | Portfolio</title>
<style>
  body { 
    margin: 0; 
    font-family: 'Inter', -apple-system, sans-serif; 
    background: #000; 
    color: white; 
    overflow-x: hidden; 
  }

  .section { 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    padding: 40px 20px;
  }

  /* 第一屏：聚焦感 */
  .hero h1 { 
    font-size: 80px; 
    margin-bottom: 10px;
    transition: transform 2s cubic-bezier(0.16, 1, 0.3, 1); 
  }
  .hero.show h1 { transform: scale(1.05); }

  /* 通用浮现 */
  .fade { opacity: 0; transform: translateY(40px); transition: all 1s ease-out; }
  .fade.show { opacity: 1; transform: translateY(0); }

  .card { 
    background: #111; padding: 40px; border-radius: 24px; 
    border: 1px solid #222; max-width: 600px;
  }

  /* BI 加载逻辑 */
  #bi { 
    width: 90%; max-width: 1000px; overflow: hidden; 
    transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1); 
    max-height: 0; opacity: 0;
  }
  #bi.active { max-height: 800px; opacity: 1; margin-top: 30px; }

  button { 
    padding: 16px 32px; border-radius: 999px; border: none; 
    background: #fff; color: #000; cursor: pointer; font-weight: 600; 
    margin-top: 20px; transition: transform 0.2s;
  }
  button:hover { transform: scale(1.05); }
  
  iframe { 
    width: 100%; height: 600px; border: none; border-radius: 16px; 
    background: #000;
  }
</style>
</head>
<body>

<div class="section hero fade">
  <h1>Zuko Liao</h1>
  <p>Turning Data into Business Decisions</p>
</div>

<div class="section fade">
  <h1>Data. Systems. Impact.</h1>
  <p>I design analytics solutions that solve real business problems.</p>
</div>

<div class="section fade">
  <h1>Experience</h1>
  <div class="card">
    <h3>Business Analyst @ L'Oréal</h3>
    <p>Focused on data automation, reporting efficiency, and system optimization.</p>
  </div>
</div>

<div class="section fade">
  <h1>Power BI Portfolio</h1>
  <button id="biBtn" onclick="toggleBI()">Launch Dashboard</button>
  <div id="bi">
    <iframe src="https://app.powerbi.com/view?r=eyJrIjoiYjMyZmViODEtYWY4Mi00MzcwLWFhODYtNWExNWRjN2I3ZjZlIiwidCI6ImZlNjhmY2Y5LTI2MGEtNDgxZi1iNjAzLWIyNGNiMjA0MjIyMiIsImMiOjZ9&pageName=ReportSection45a35629207192d9414b" allowFullScreen="true"></iframe>
  </div>
</div>

<script>
// 滚动检测
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('show');
  });
}, { threshold: 0.2 });

document.querySelectorAll('.fade').forEach(el => observer.observe(el));

// BI 加载交互
function toggleBI() {
  const bi = document.getElementById('bi');
  const btn = document.getElementById('biBtn');
  bi.classList.toggle('active');
  btn.innerText = bi.classList.contains('active') ? 'Hide Dashboard' : 'Launch Dashboard';
}
</script>
</body>
</html>
